<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>APEX ACADEMY — Learn Beyond Screens</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme:{ extend:{
      colors:{
        ink:'#0F1F3D', paper:'#F5F8FC', sky:'#4A8BD6', cyan:'#6DC4E8',
        muted:'#6B7C93', wash1:'#DCE8F5', wash2:'#B8D0EA'
      },
      fontFamily:{
        display:['Manrope','sans-serif'],
        serif:['Fraunces','serif'],
        mono:['"JetBrains Mono"','monospace'],
        sans:['Manrope','sans-serif']
      }
    }}
  }
</script>
<style>
  :root{
    --ink:#0F1F3D; --paper:#F5F8FC; --sky:#4A8BD6; --cyan:#6DC4E8;
    --muted:#6B7C93; --wash1:#DCE8F5; --wash2:#B8D0EA;
  }
  html,body{ margin:0; background: var(--paper); color: var(--ink); font-family:'Manrope', sans-serif; font-weight:400; }
  body{
    background:
      radial-gradient(ellipse 1400px 800px at 80% -100px, rgba(109,196,232,0.25), transparent 55%),
      radial-gradient(ellipse 1200px 900px at 10% 30%, rgba(74,139,214,0.18), transparent 60%),
      radial-gradient(ellipse 1600px 600px at 50% 100%, rgba(220,232,245,0.9), transparent 70%),
      linear-gradient(180deg, #F5F8FC 0%, #EAF2FB 40%, #DCE8F5 80%, #C9DEF0 100%);
    background-attachment: fixed;
    min-height:100vh;
  }

  /* tiny cloud specks for depth */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(ellipse 800px 200px at 20% 10%, rgba(255,255,255,0.7), transparent 60%),
      radial-gradient(ellipse 600px 160px at 80% 40%, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(ellipse 900px 180px at 40% 75%, rgba(255,255,255,0.55), transparent 60%);
  }

  /* Glass panel */
  .glass{
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(32px) saturate(1.2);
    -webkit-backdrop-filter: blur(32px) saturate(1.2);
    border-top:1px solid rgba(255,255,255,0.85);
    border-left:1px solid rgba(255,255,255,0.7);
    border-right:1px solid rgba(74,139,214,0.15);
    border-bottom:1px solid rgba(74,139,214,0.18);
    border-radius:4px;
    box-shadow: 0 24px 60px rgba(74,139,214,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
    position:relative;
    transition: box-shadow .35s ease, background .35s ease;
  }
  .glass:hover{
    background: rgba(255,255,255,0.62);
    box-shadow: 0 28px 70px rgba(74,139,214,0.18), inset 0 1px 0 rgba(255,255,255,0.95), 0 0 0 1px rgba(109,196,232,0.35);
  }
  .glass-strong{
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(40px) saturate(1.25);
    -webkit-backdrop-filter: blur(40px) saturate(1.25);
  }
  .glass-light{
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(20px) saturate(1.1);
    -webkit-backdrop-filter: blur(20px) saturate(1.1);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:4px;
  }

  /* Architectural L-corner marks — very thin */
  .corners{ position:relative; }
  .corners::before, .corners::after,
  .corners > .c-tr, .corners > .c-bl{
    content:""; position:absolute; width:7px; height:7px;
    border:0 solid rgba(109,196,232,0.75); pointer-events:none;
  }
  .corners::before{ top:6px; left:6px; border-top-width:1px; border-left-width:1px; }
  .corners::after{ top:6px; right:6px; border-top-width:1px; border-right-width:1px; }
  .corners > .c-tr{ bottom:6px; right:6px; border-bottom-width:1px; border-right-width:1px; }
  .corners > .c-bl{ bottom:6px; left:6px; border-bottom-width:1px; border-left-width:1px; }

  /* Typography */
  .display{ font-family:'Manrope', sans-serif; font-weight:200; letter-spacing:-0.035em; line-height:0.95; color: var(--ink); }
  .serif-italic{ font-family:'Fraunces', serif; font-style:italic; font-weight:300; letter-spacing:-0.015em; }
  .label{ font-family:'Manrope', sans-serif; font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color: var(--sky); }
  .label-muted{ font-family:'Manrope', sans-serif; font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color: var(--muted); }
  .mono{ font-family:'JetBrains Mono', monospace; font-weight:300; }
  .slash{ color: var(--cyan); font-weight:200; }
  .divider{ height:1px; background: rgba(74,139,214,0.2); width:100%; }

  /* Buttons */
  .btn-glass{
    display:inline-flex; align-items:center; gap:12px;
    padding:14px 24px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    border:1px solid rgba(255,255,255,0.85);
    box-shadow: 0 12px 30px rgba(74,139,214,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
    font-size:11px; font-weight:600; letter-spacing:0.22em; text-transform:uppercase;
    color: var(--ink); border-radius:4px; transition: all .25s ease;
    cursor:pointer;
  }
  .btn-glass .arrow{ color: var(--cyan); transition: transform .25s ease; display:inline-block; }
  .btn-glass:hover{
    background: rgba(255,255,255,0.82);
    box-shadow: 0 16px 40px rgba(109,196,232,0.3), 0 0 0 1px rgba(109,196,232,0.4), inset 0 1px 0 rgba(255,255,255,0.95);
  }
  .btn-glass:hover .arrow{ transform: translateX(4px); }
  .btn-ghost{
    display:inline-flex; align-items:center; gap:10px;
    font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase;
    color: var(--ink); transition: color .2s ease;
  }
  .btn-ghost .arrow{ color: var(--cyan); transition: transform .25s ease; display:inline-block; }
  .btn-ghost:hover{ color: var(--sky); }
  .btn-ghost:hover .arrow{ transform: translateX(4px); }

  /* Pills */
  .pill{ display:inline-flex; align-items:center; gap:8px; padding:6px 12px;
    font-family:'Manrope'; font-size:10px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase;
    border-radius:999px; background: rgba(255,255,255,0.6);
    border:1px solid rgba(74,139,214,0.25); color: var(--ink); }
  .pill .dot{ width:6px; height:6px; border-radius:50%; background: var(--cyan); box-shadow:0 0 8px var(--cyan); }
  .pill.live .dot{ background:#3BC77A; box-shadow:0 0 8px #3BC77A;}
  .pill.amber{ background:rgba(255,240,210,0.7); border-color:rgba(230,170,50,0.4);}
  .pill.amber .dot{ background:#E8A547; box-shadow:0 0 8px #E8A547;}
  .pill.planned{ background:rgba(255,255,255,0.4); border-color:rgba(107,124,147,0.3); color: var(--muted);}
  .pill.planned .dot{ background: transparent; border:1px solid var(--muted); box-shadow:none;}

  /* Nav link */
  .nav-link{ position:relative; padding:6px 2px;
    font-family:'Manrope'; font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color: var(--ink); }
  .nav-link:hover{ color: var(--sky); }
  .nav-link.active{ color: var(--ink); }
  .nav-link.active::after{
    content:""; position:absolute; left:0; right:0; bottom:-2px; height:1px; background: var(--cyan);
  }
  .nav-link.active::before{
    content:""; position:absolute; left:50%; bottom:-6px; width:4px; height:4px; border-radius:50%;
    transform:translateX(-50%); background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
  }

  /* Custom cursor */
  @media (pointer:fine){
    .cursor-dot{ position:fixed; left:0; top:0; width:10px; height:10px; border-radius:50%;
      background: rgba(109,196,232,0.9); pointer-events:none; z-index:200;
      transform: translate(-50%,-50%); transition: width .2s ease, height .2s ease, background .2s ease;
      mix-blend-mode: multiply;
    }
    .cursor-dot.hover{ width:36px; height:36px; background: rgba(109,196,232,0.25); border:1px solid rgba(109,196,232,0.6); }
    html, body, a, button{ cursor: none; }
  }

  /* Imagery placeholders — cinematic blue */
  .img-sky{
    background:
      radial-gradient(ellipse 600px 300px at 30% 30%, rgba(255,255,255,0.9), transparent 70%),
      radial-gradient(ellipse 500px 250px at 80% 70%, rgba(109,196,232,0.5), transparent 70%),
      linear-gradient(180deg, #E9F2FC 0%, #C9DEF0 60%, #A8C6E3 100%);
    position:relative; overflow:hidden;
  }
  .img-dome{
    background:
      radial-gradient(ellipse 500px 600px at 50% 60%, rgba(255,255,255,0.8), transparent 70%),
      linear-gradient(160deg, #D4E5F4 0%, #A6C4E2 50%, #7FA6CC 100%);
    position:relative; overflow:hidden;
  }
  .img-dome::before{
    content:""; position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.35) 0 1px, transparent 1px 42px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.15) 0 1px, transparent 1px 42px);
    mask: radial-gradient(ellipse 80% 60% at 50% 55%, black 40%, transparent 75%);
  }
  .img-atrium{
    background:
      linear-gradient(180deg, #F5FAFD 0%, #D5E5F5 40%, #B3CDE5 70%, #90B4D3 100%);
    position:relative; overflow:hidden;
  }
  .img-atrium::before{
    content:""; position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.5) 0 2px, transparent 2px 64px);
    mask: linear-gradient(180deg, transparent 20%, black 35%, black 90%, transparent);
  }
  .img-crystal{
    background:
      conic-gradient(from 220deg at 50% 50%, #DEECFB 0deg, #B6D2EC 60deg, #E3F1FB 120deg, #8AB4DA 180deg, #D4E6F5 240deg, #A9CAE8 300deg, #DEECFB 360deg);
    filter: blur(1.5px);
    position:relative; overflow:hidden;
  }
  .img-lab{
    background:
      radial-gradient(ellipse 500px 250px at 50% 40%, rgba(109,196,232,0.6), transparent 70%),
      radial-gradient(ellipse 400px 300px at 20% 80%, rgba(255,255,255,0.8), transparent 70%),
      linear-gradient(170deg, #E0EEF9 0%, #B5D1EC 100%);
    position:relative; overflow:hidden;
  }
  .img-cloud{
    background:
      radial-gradient(ellipse 700px 350px at 30% 30%, rgba(255,255,255,0.95), transparent 70%),
      radial-gradient(ellipse 500px 280px at 70% 60%, rgba(255,255,255,0.7), transparent 70%),
      linear-gradient(180deg, #E1EEF9 0%, #BFD8EE 50%, #93BADA 100%);
  }
  .img-library{
    background:
      linear-gradient(180deg, #F0F7FC 0%, #CDDFF0 60%, #A3BFDB 100%);
    position:relative; overflow:hidden;
  }
  .img-library::before{
    content:""; position:absolute; inset:0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.4) 0 1px, transparent 1px 38px);
    mask: linear-gradient(180deg, transparent 10%, black 40%, black 95%);
  }
  .img-horizon{
    background:
      linear-gradient(180deg, #EAF3FC 0%, #C9DFF0 45%, #9FBFDC 70%, #7AA6C9 100%);
    position:relative;
  }
  .img-blue{
    background:
      radial-gradient(ellipse 600px 400px at 50% 50%, rgba(109,196,232,0.55), transparent 70%),
      linear-gradient(160deg, #D4E8F8 0%, #7FA8D0 50%, #4A8BD6 100%);
    position:relative; overflow:hidden;
  }
  .img-earth{
    background:
      radial-gradient(ellipse 600px 400px at 60% 40%, rgba(255,255,255,0.7), transparent 60%),
      conic-gradient(from 160deg at 60% 50%, #E8F2FA 0deg, #B8D4ED 90deg, #8FB3D8 180deg, #C5DCF0 270deg, #E8F2FA 360deg);
    filter: blur(0.5px);
    position:relative; overflow:hidden;
  }

  .ray{
    position:absolute; inset:0; pointer-events:none;
    background:
      linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.35) 50%, transparent 60%),
      linear-gradient(105deg, transparent 45%, rgba(255,255,255,0.25) 55%, transparent 65%);
    mix-blend-mode: screen;
  }

  /* Form inputs */
  .glass-input{ width:100%; background:transparent; border:none; outline:none;
    border-bottom:1px solid rgba(74,139,214,0.3);
    padding:12px 0 10px; color: var(--ink); font-size:15px; font-weight:400;
    font-family:'Manrope'; transition: border-color .25s ease; }
  .glass-input:focus{ border-color: var(--cyan); }
  .glass-input::placeholder{ color: rgba(107,124,147,0.6); }

  /* Page transition */
  @keyframes fadeUp{ from{ opacity:0; transform: translateY(12px);} to{opacity:1; transform:none;} }
  .page-enter{ animation: fadeUp .5s cubic-bezier(.2,.7,.2,1) both; }

  /* Scroll reveal */
  .reveal{ opacity:0; transform: translateY(16px); filter: blur(6px); transition: all .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in{ opacity:1; transform:none; filter:none; }

  /* Count-up + generic motion */
  @keyframes pulseDot{ 0%{transform:scale(1); opacity:.9} 50%{transform:scale(1.5); opacity:.3} 100%{transform:scale(1); opacity:.9} }
  .dot-pulse{ animation: pulseDot 2.4s ease-in-out infinite; }

  /* Mobile menu overlay */
  .menu-overlay{
    position:fixed; inset:0; z-index:90;
    background:
      radial-gradient(ellipse 1200px 800px at 30% 20%, rgba(109,196,232,0.45), transparent 60%),
      linear-gradient(180deg, rgba(245,248,252,0.95) 0%, rgba(185,214,236,0.95) 100%);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
  }

  *{ box-sizing:border-box; }
  ::selection{ background: rgba(109,196,232,0.4); color: var(--ink); }
</style>
</head>
<body>
<div id="cursor" class="cursor-dot"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="details.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
  // Cursor
  (() => {
    const d = document.getElementById('cursor');
    if (!d) return;
    let mx=0, my=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; d.style.left=mx+'px'; d.style.top=my+'px'; });
    document.addEventListener('mouseover', e => {
      const t = e.target.closest('a, button, [data-hover]');
      if (t) d.classList.add('hover'); else d.classList.remove('hover');
    });
  })();
</script>
</body>
</html>
